- name: Ensure git is installed
  ansible.builtin.apt:
    name: git
    state: present

- name: Create base directory for reference material
  ansible.builtin.file:
    path: "{{ reference_repos_dir }}"
    state: directory
    mode: "0755"
    owner: "{{ the_user }}"
    group: "{{ the_user }}"

- name: Clone reference repositories
  ansible.builtin.git:
    repo: "{{ item }}"
    dest: "{{ reference_repos_dir }}/{{ item | urlsplit('path') | basename | regex_replace('\\.git$', '') }}"
    depth: 1
    update: true
  become_user: "{{ the_user }}"
  loop: "{{ reference_repos }}"
