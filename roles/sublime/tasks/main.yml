# Set up repo and keys for apt to be able to install sublime
- name: Download SublimeHQ GPG key
  get_url:
    url: https://download.sublimetext.com/sublimehq-pub.gpg
    dest: /usr/share/keyrings/sublimehq.gpg
    mode: '0644'
    checksum: "sha256:5ad4afdaa74d78ba1a322cde4ed2c73d016d189492995a284a607816db5cacbe"

- name: Add SublimeHQ apt repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/sublimehq.gpg] https://download.sublimetext.com/ apt/stable/"
    state: present
    filename: sublime-text

- name: Update apt cache after adding repo
  apt:
    update_cache: true

- name: Install Sublime Text and Sublime Merge
  apt:
    name:
      - sublime-text
      - sublime-merge
    state: present
    update_cache: true
    cache_valid_time: 3600

# License activation (skipped if variables are not set)
- name: Ensure Sublime Text config directory exists
  file:
    path: "/home/{{ the_user }}/.config/sublime-text/Local"
    state: directory
    owner: "{{ the_user }}"
    group: "{{ the_user }}"
    mode: "0700"
  when: sublime_text_license | default('') | length > 0

- name: Activate Sublime Text license
  copy:
    content: "{{ sublime_text_license }}"
    dest: "/home/{{ the_user }}/.config/sublime-text/Local/License.sublime_license"
    owner: "{{ the_user }}"
    group: "{{ the_user }}"
    mode: "0600"
  when: sublime_text_license | default('') | length > 0

- name: Ensure Sublime Merge config directory exists
  file:
    path: "/home/{{ the_user }}/.config/sublime-merge/Local"
    state: directory
    owner: "{{ the_user }}"
    group: "{{ the_user }}"
    mode: "0700"
  when: sublime_merge_license | default('') | length > 0

- name: Activate Sublime Merge license
  copy:
    content: "{{ sublime_merge_license }}"
    dest: "/home/{{ the_user }}/.config/sublime-merge/Local/License.sublime_license"
    owner: "{{ the_user }}"
    group: "{{ the_user }}"
    mode: "0600"
  when: sublime_merge_license | default('') | length > 0
